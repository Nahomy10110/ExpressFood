sonar.projectKey=Nahomy10110_ExpressFood
sonar.organization=Nahomy10110
sonar.host.url=https://sonarcloud.io
sonar.projectName=ExpressFood
sonar.projectVersion=1.0.0

# Fuentes y tests
sonar.sources=app/src/main/java
sonar.tests=app/src/test/java,app/src/androidTest/java

# Reportes
sonar.kotlin.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
sonar.junit.reportPaths=app/build/test-results/testDebugUnitTest
sonar.androidLint.reportPaths=app/build/reports/lint-results-debug.xml

# Exclusiones
sonar.exclusions=**/build/**,**/generated/**,**/*Test*.kt,**/databinding/**,**/BuildConfig.*

# Java/Kotlin
sonar.java.binaries=app/build/intermediates/javac/debug/classes,app/build/tmp/kotlin-classes/debug
sonar.sourceEncoding=UTF-8