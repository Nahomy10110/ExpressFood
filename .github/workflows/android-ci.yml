name: ExpressFood - Android CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

jobs:
  # =========================================================================
  # 1) BUILD & TEST + cobertura
  # SonarCloud está temporalmente deshabilitado por incompatibilidad del plugin.
  # Para reactivarlo: descomentar el step "SonarCloud analysis" más abajo.
  # =========================================================================
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Lint
        run: ./gradlew lintDebug

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html
            app/build/reports/jacoco/

      # ---------------------------------------------------------------------
      # SonarCloud analysis — DESHABILITADO TEMPORALMENTE
      # Motivo: el plugin sonarqube-gradle-plugin 5.1.0.4882 falla con
      # "Unable to create analysis" por incompatibilidad con las extensiones
      # core de SonarCloud (sca, architecture).
      # Para reactivar: descomentar las 5 líneas siguientes.
      # ---------------------------------------------------------------------
      # - name: SonarCloud analysis
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
      #   run: ./gradlew sonar --info

  # =========================================================================
  # 2) BUILD APK firmado
  # =========================================================================
  build-apk:
    name: Build signed release APK
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Decode keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/expressfood-release.jks

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build release APK
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/expressfood-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: ExpressFood-release-apk
          path: app/build/outputs/apk/release/*.apk